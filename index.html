<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Northern Virginia Wedding Guide</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { min-height: 100%; overflow-x: hidden; background: #FDF5F7; }
    #root { min-height: 100vh; }
    #loader {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; background: #FDF5F7;
    }
    .spin {
      width: 44px; height: 44px; margin: 24px auto 0;
      border: 3px solid #F2C4CB; border-top-color: #8B5E6A;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loader">
    <div style="font-family:Georgia,serif;font-size:28px;font-style:italic;color:#8B5E6A">Northern Virginia</div>
    <div style="font-family:Georgia,serif;font-size:28px;font-style:italic;color:#8B5E6A">Wedding Guide</div>
    <div class="spin"></div>
    <div id="loader-msg" style="font-family:sans-serif;font-size:11px;color:#B8AAAC;letter-spacing:0.2em;text-transform:uppercase;margin-top:16px">Loading directory...</div>
  </div>
  <div id="root" style="display:none"></div>
  <script>
    var VENUES=[], VENDORS=[];
    Promise.all([
      fetch("https://raw.githubusercontent.com/novaweddingguide/nova-wedding-guide/main/nova-venues-data.json").then(function(r){return r.json();}),
      fetch("https://raw.githubusercontent.com/novaweddingguide/nova-wedding-guide/main/nova-vendors-data.json").then(function(r){return r.json();})
    ]).then(function(d){
      VENUES=d[0]; VENDORS=d[1];
      document.getElementById("loader").style.display="none";
      document.getElementById("root").style.display="block";
    }).catch(function(){
      document.getElementById("loader-msg").textContent="Could not load data. Check your internet connection.";
      document.getElementById("loader-msg").style.color="#c0392b";
      document.querySelector(".spin").style.display="none";
    });
  </script>
